# Self-signed TLS reverse proxy in front of the Confluence container.
# Terminates HTTPS on :8443 using the cert generated by `make certs`, and
# forwards to the plain-HTTP Confluence service. This is what cfl talks to when
# exercising SSL_CERT_FILE / --insecure.

server {
    listen 8443 ssl;
    server_name wiki.local;

    ssl_certificate     /etc/nginx/certs/wiki.local.crt;
    ssl_certificate_key /etc/nginx/certs/wiki.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Confluence generates absolute URLs from the Host header; preserve it so
    # webui links and the REST base match what the client requested.
    proxy_set_header Host              $host:$server_port;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    client_max_body_size 25m;

    location / {
        proxy_pass http://confluence:8090;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }
}
