# Self-signed TLS server with STATIC responses — no Confluence required.
#
# This server exists purely to exercise cfl's TLS handling (SSL_CERT_FILE and
# --insecure) against a self-signed certificate, with zero dependency on a
# licensed Confluence instance. It returns canned Confluence-shaped JSON for the
# space-list endpoint so the cfl command path runs end to end over real TLS.

server {
    listen 8444 ssl;
    server_name wiki.local;

    ssl_certificate     /etc/nginx/certs/wiki.local.crt;
    ssl_certificate_key /etc/nginx/certs/wiki.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    default_type application/json;

    # Canned space listing: enough for cfl to render a SpaceList and for the
    # test to assert TLS succeeded.
    location = /rest/api/space {
        return 200 '{"results":[{"key":"TLS","name":"TLS Probe Space","type":"global"}],"start":0,"limit":25,"size":1}';
    }

    # Canned current-user, so an auth whoami probe also works over TLS.
    location = /rest/api/user/current {
        return 200 '{"username":"tls-probe","displayName":"TLS Probe"}';
    }

    # Anything else: a minimal not-found shaped like Confluence.
    location / {
        return 404 '{"message":"not found"}';
    }
}
